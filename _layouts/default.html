<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <meta name="author" content="Wojciech Kocik">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: 'Wojciech Kocik - software engineer focused on backend systems, cloud platforms, and pragmatic delivery.' }}">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/favicon.png">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.2/dist/terminal.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/assets/css/styles.css?v={{ site.time | date: '%s' }}">
</head>
<body class="terminal">
    <div class="page-shell">
        <header class="site-header">
            <div class="site-header__inner">
                <a href="/" class="site-brand">
                    <img src="/assets/images/logo-lockup.png" alt="Wojciech Kocik" class="site-brand__logo">
                    <span class="sr-only">Wojciech Kocik</span>
                </a>
                {% include navigation.html %}
            </div>
        </header>

        <main class="page-content">
            {{ content }}
        </main>

        <footer class="site-footer">
            <p>© {{ site.time | date: '%Y' }} Wojciech Kocik</p>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/wojciech-kocik-290a9778" title="LinkedIn" target="_blank" rel="noopener noreferrer" class="fa fa-linkedin"></a>
                <a href="https://github.com/wojciechkocik" title="GitHub" target="_blank" rel="noopener noreferrer" class="fa fa-github"></a>
            </div>
        </footer>
    </div>
</body>
</html>
