---
layout: default
---
<article class="surface blog-post">
    {% if page.header_image %}
    <img src="{{ page.header_image }}" alt="{{ page.header_image_alt | default: page.title }}" class="blog-post__hero-image">
    {% endif %}
    <p class="eyebrow">Blog Post</p>
    <header class="blog-post__header">
        <h1>{{ page.title }}</h1>
        <p class="blog-post__meta">{{ page.date | date: "%B %-d, %Y" }}</p>
        {% if page.description %}
        <p class="lead">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="blog-post__content">
        {{ content }}
    </div>
</article>
